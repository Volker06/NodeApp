<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note App — Offline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e3a5f 0%, #111827 100%);
            color: white;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 400px;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        h1 {
            font-size: 24px;
            margin-bottom: 12px;
            font-weight: 700;
        }
        p {
            font-size: 16px;
            color: #9ca3af;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #2563eb; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>Bạn đang offline</h1>
        <p>Không thể kết nối đến máy chủ. Hãy kiểm tra kết nối mạng và thử lại.</p>
        <button onclick="window.location.reload()">Thử lại</button>
    </div>
</body>
</html>
